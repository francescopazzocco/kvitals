site_name: KVitals
site_description: A lightweight KDE Plasma 6 panel widget for live system vitals
site_url: https://kvitals.dev/
repo_url: https://github.com/yassine20011/kvitals
repo_name: yassine20011/kvitals

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - Contributing: contributing.md
  - Troubleshooting: troubleshooting.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yassine20011

plugins:
  - search
  - llmstxt:
      markdown_description: >
        KVitals is a lightweight KDE Plasma 6 panel widget that displays live
        system vitals including CPU usage, memory usage, CPU temperature,
        GPU metrics, battery status, power draw, and network upload/download
        speeds directly in your panel. It uses native KDE KSysGuard sensors and 
        is fully configurable through a settings UI.
      full_output: llms-full.txt
      sections:
        Getting started:
          - index.md: Overview and features of KVitals
          - installation.md: How to install KVitals on KDE Plasma 6
          - configuration.md: Widget settings and customization options
        Technical reference:
          - architecture.md: System architecture, data flow, and component design
          - troubleshooting.md: Common issues and solutions
        Community:
          - contributing.md: How to contribute to the project
          - changelog.md: Version history and release notes
